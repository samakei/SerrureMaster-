<svg viewBox="0 0 380 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orange_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text_gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon circle with gradient background -->
  <circle cx="35" cy="35" r="30" fill="url(#orange_gradient)"/>
  
  <!-- Key -->
  <g transform="translate(8, 28)">
    <!-- Key shaft -->
    <rect x="0" y="0" width="24" height="6" rx="3" fill="white"/>
    <!-- Key head (circle) -->
    <circle cx="0" cy="3" r="5" fill="white"/>
    <!-- Key teeth -->
    <rect x="24" y="1" width="3" height="4" fill="white"/>
    <rect x="28" y="1" width="2" height="4" fill="white"/>
  </g>
  
  <!-- Lock -->
  <g transform="translate(38, 20)">
    <!-- Lock body -->
    <rect x="0" y="0" width="12" height="18" rx="2" fill="white"/>
    <!-- Lock hole -->
    <circle cx="6" cy="12" r="3" fill="#FF8C00"/>
    <!-- Security line -->
    <line x1="1" y1="12" x2="11" y2="12" stroke="#FF8C00" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Text -->
  <g transform="translate(75, 0)">
    <text x="0" y="32" font-family="Inter, sans-serif" font-weight="800" font-size="24" letter-spacing="0.5" fill="#ffffff">SERRURE</text>
    <text x="0" y="52" font-family="Inter, sans-serif" font-weight="800" font-size="24" letter-spacing="0.5" fill="url(#text_gradient)">MASTER</text>
    <g transform="translate(140, 18)">
      <rect x="0" y="0" width="90" height="18" rx="9" fill="url(#orange_gradient)" opacity="0.2" />
      <text x="45" y="12" font-family="Inter, sans-serif" font-weight="700" font-size="8" fill="#ffffff" letter-spacing="1.5" text-anchor="middle">PRO LOCKSMITH</text>
    </g>
  </g>
</svg>
